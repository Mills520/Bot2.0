# PostgreSQL runs on the host — when these containers need it, set
# DATABASE_URL's host to host.docker.internal instead of localhost.
services:
  opsbot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data

  # Optional read-only web dashboard at http://localhost:8080
  dashboard:
    build: .
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
